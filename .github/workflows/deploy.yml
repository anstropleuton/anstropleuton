name: Build & Deploy to GitHub Pages (pnpm) — robust

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (full)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm on PATH
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Show pnpm & repo info (quick sanity)
        run: |
          node -v
          npm -v
          pnpm -v
          echo "ls root:"
          ls -la

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
        # If your pnpm-lock.yaml lives in a subfolder, add: working-directory: ./path/to

      - name: Build
        run: pnpm run build
        # If your project is not at repo root, add: working-directory: ./path/to

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
